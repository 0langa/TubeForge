name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Read version from tag
        id: version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "TubeForge publishes stable releases only; invalid tag: $tag"
          }
          "value=$($tag.Substring(1))" >> $env:GITHUB_OUTPUT

      - name: Import optional code-signing certificate
        id: signing
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.TUBEFORGE_SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.TUBEFORGE_SIGNING_PFX_PASSWORD }}
          TIMESTAMP_SERVER: ${{ vars.TUBEFORGE_TIMESTAMP_SERVER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64) -and
              [string]::IsNullOrWhiteSpace($env:SIGNING_PFX_PASSWORD)) {
            'enabled=false' >> $env:GITHUB_OUTPUT
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:SIGNING_PFX_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:TIMESTAMP_SERVER)) {
            throw 'Signing requires both PFX secrets and TUBEFORGE_TIMESTAMP_SERVER.'
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'tubeforge-signing.pfx'
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
            $password = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
            $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            if (@($certificate).Count -ne 1) {
              throw 'The signing PFX must import exactly one certificate.'
            }
            "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
            'enabled=true' >> $env:GITHUB_OUTPUT
          }
          finally {
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Build
        run: dotnet build TubeForge.slnx --configuration Release

      - name: Test
        run: dotnet run --project tests/TubeForge.Tests --configuration Release --no-build -- --all

      - name: Core performance budget
        run: dotnet run --project tools/TubeForge.Performance --configuration Release --no-build -- --core-only

      - name: Produce release archives
        shell: pwsh
        run: |
          $arguments = @{ Version = '${{ steps.version.outputs.value }}' }
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            $arguments.CertificateThumbprint = '${{ steps.signing.outputs.thumbprint }}'
            $arguments.TimestampServer = '${{ vars.TUBEFORGE_TIMESTAMP_SERVER }}'
          }
          .\scripts\Publish-Release.ps1 @arguments

      - name: Verify release archives
        shell: pwsh
        run: |
          $arguments = @{ Version = '${{ steps.version.outputs.value }}'; SkipLaunch = $true }
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            $arguments.RequireAuthenticode = $true
          }
          .\scripts\Test-Release.ps1 @arguments

      - name: Produce installer
        shell: pwsh
        run: |
          $arguments = @{ Version = '${{ steps.version.outputs.value }}' }
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            $arguments.CertificateThumbprint = '${{ steps.signing.outputs.thumbprint }}'
            $arguments.TimestampServer = '${{ vars.TUBEFORGE_TIMESTAMP_SERVER }}'
          }
          .\scripts\Publish-Installer.ps1 @arguments
          Get-Content artifacts/installer/SHA256SUMS.txt | Add-Content artifacts/release/SHA256SUMS.txt

      - name: Verify installer
        shell: pwsh
        run: |
          $arguments = @{ Version = '${{ steps.version.outputs.value }}' }
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            $arguments.RequireAuthenticode = $true
          }
          .\scripts\Test-Installer.ps1 @arguments

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/release/*.zip
            artifacts/release/*-manifest.json
            artifacts/release/SHA256SUMS.txt
            artifacts/installer/*-setup.exe

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' `
            artifacts/release/*.zip `
            artifacts/release/*-manifest.json `
            artifacts/release/SHA256SUMS.txt `
            artifacts/installer/*-setup.exe `
            --verify-tag `
            --title "TubeForge ${{ github.ref_name }}" `
            --notes-file docs/RELEASE_NOTES.md `
            --generate-notes

      - name: Remove imported signing certificate
        if: always() && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: Remove-Item -LiteralPath 'Cert:\CurrentUser\My\${{ steps.signing.outputs.thumbprint }}' -Force

